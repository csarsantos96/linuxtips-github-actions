name: Vendos arquivos compartilhados entre steps

on:
  push:
    branches:
      - main

jobs:
  entre-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versao do ubuntu
        run: cat /etc/os-release
        
      - name: Exebir uma mensagem
        run: echo "Estou fazendo um curso de Github Actions da LinuxTips" > mensagem.txt

      - name: Qualquer outra coisa
        run: ls -lha 

      - name: Le o conteudo do arquivo
        run: cat mensagem.txt