name: Criando quarto arquivo

on:
  push:
    branches:
      - main

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versao do ubuntu
        run: cat /etc/os-release
        
      - name: Exebir uma mensagem
        run: echo "Estou fazendo um curso de Github Actions da LinuxTips" > /home/ubuntu/mensagem.txt

      - uses: actions/upload-artifact@v4
        with:
          name: strigus         
          path: /home/ubuntu/mensagem.txt

  job_2:
    runs-on: ubuntu-latest
    steps:
      - name: Ver o conteudo do diretorio
        run: ls -lha

      - uses: actions/download-artifact@v4
        with:
          name: strigus         
          path: mensagem.txt
      
      - name: Ver o conteudo do diretorio
        run: ls -lha && ls ./strigus/
      
      - name: Acessar arquivo mensagem
        run: mv strigus/mensagem.txt . && rm -rf ./strigus

      - name: Ver o conteudo do diretorio
        run: ls -lha
      
      - name: Acessar arquivo mensagem
        run: cat mensagem.txt

